version: '3.8'

services:
  # Auth Service Database
  auth-db: 
    image: postgres:15-alpine
    container_name: auth-postgres
    restart: always
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_db 
    ports:
      # HostPort: ContainerPort
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data 

volumes:
  auth_db_data:
